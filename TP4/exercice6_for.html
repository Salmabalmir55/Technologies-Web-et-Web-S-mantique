<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 6 : Suite de Fibonacci (boucle for)</title>
</head>
<body>
    <script>
        function Fibo1() {
            let n = parseInt(prompt("Entrez le rang n souhaité :"));
            let u0 = 0, u1 = 1, un = 0;

            if (n === 0) un = u0;
            else if (n === 1) un = u1;
            else {
                for (let i = 2; i <= n; i++) {
                    un = u0 + u1;
                    u0 = u1;
                    u1 = un;
                }
            }
            alert("Le " + n + "-ième terme est : " + un);
        }
        Fibo1();
    </script>
</body>
</html>
