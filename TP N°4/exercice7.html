<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 7 : Valeur approchée de la √ d'un nombre réel positif</title>
</head>
<body>
    <h1>Calcul de racine carrée (Méthode de Newton)</h1>

    <script>
        function Raca1() {
            let A = parseFloat(prompt("Pour un nombre A entre 1 et 100 :"));

            if (isNaN(A) || A < 1 || A > 100) {
                alert("Veuillez entrer un nombre entre 1 et 100.");
                return;
            }

            let u = A / 2;
            let precision = Math.pow(10, -8); 


            while (Math.abs(Math.pow(u, 2) - A) >= precision) {
                u = 0.5 * (u + (A / u));
            }


            console.log("Pour un nombre A entre 1 et 100 : " + A);
            console.log("Valeur approchée de la racine carrée = " + u);
            alert("Valeur approchée de la racine carrée = " + u);
        }


        Raca1();
    </script>
</body>
</html>
