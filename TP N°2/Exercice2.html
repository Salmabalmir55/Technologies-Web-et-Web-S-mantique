<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
</head>
<body>

<h3>Avec boutons radios :</h3>

<form>
    <input type="nombre" name="nb1">

    <select name="operation">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="nombre" name="nb2">

    <br><br>
    <input type="submit" value="envoyer">
</form>

<hr>

<h3>Avec boutons radios :</h3>

<form>
    <input type="nombre" name="nb1">

    <input type="radio" name="operation" value="+"> +
    <input type="radio" name="operation" value="-"> -
    <input type="radio" name="operation" value="*"> *
    <input type="radio" name="operation" value="/"> /

    <input type="nombre" name="nb2">

    <br><br>
    <input type="submit" value="envoyer">
</form>

</body>
</html>
