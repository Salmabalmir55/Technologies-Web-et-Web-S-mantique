<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>
</head>
<body>

    <center>
        <h2>User registration form</h2>
        
        <form action="#" method="post">
            <table border="1" cellspacing="0" cellpadding="10" width="600">
                <tr>
                    <td width="200">Full Name</td>
                    <td><input type="text" name="nom" style="width: 95%;"></td>
                </tr>

                <tr>
                    <td>Adress</td>
                    <td>
                        <textarea name="adresse" rows="4" style="width: 95%;"></textarea>
                    </td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="email" name="email" style="width: 95%;"></td>
                </tr>

                <tr>
                    <td>Password</td>
                    <td><input type="password" name="mdp" style="width: 95%;"></td>
                </tr>

                <tr>
                    <td>Date of birth</td>
                    <td><input type="date" name="naissance"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="genre" value="M"> Male
                        <input type="radio" name="genre" value="F"> Female
                    </td>
                </tr>

                <tr>
                    <td>Please choose topics of interest</td>
                    <td>
                        <input type="checkbox" name="interet" value="fiction"> Fiction<br>
                        <input type="checkbox" name="interet" value="action"> Action<br>
                        <input type="checkbox" name="interet" value="thriller"> Thriller<br>
                        <input type="checkbox" name="interet" value="horror"> Horror<br>
                        <input type="checkbox" name="interet" value="comedy"> Comedy
                    </td>
                </tr>

                <tr>
                    <td>Select hobbies</td>
                    <td>
                        <select name="loisirs" size="4" multiple style="width: 95%;">
                            <option value="sport_out">Outdoor Sports</option>
                            <option value="sport_adv">Adventure Sports</option>
                            <option value="pop">Pop Music</option>
                            <option value="rock">Rock Music</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="left">
                        <input type="submit" value="submit">
                    </td>
                </tr>
            </table>
        </form>
    </center>

</body>
</html>
