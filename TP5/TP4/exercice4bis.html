<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercice 4-bis : Affichage de motifs - pyramides</title>
</head>
<body>

  <script>
    function pyramide() {
      var n = Number(prompt("donnez taille du motif :"));
      var resultat = "";

      for (var i = 0; i <= n; i++) {
        for (var j = 0; j <= n * 2; j++) {
          if (j >= n - i && j <= n + i)
            resultat += "*";
          else
            resultat += " ";
        }
        resultat += "\n";
      }

      alert(resultat);
    }

    pyramide();
  </script>

</body>
</html>
