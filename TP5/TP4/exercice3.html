<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Classer 3 nombres</title>
</head>
<body>

  <h2>Exercice 3 : Classer 3 nombres</h2>

  <script>
    function troisNombres() {
      let a = Number(prompt("1er nombre :"));
      let b = Number(prompt("2ème nombre :"));
      let c = Number(prompt("3ème nombre :"));

      let min, milieu, max;

      if (a <= b && a <= c) {
        min = a;
        if (b <= c) { 
            milieu = b; 
            max = c; }
        else{ 
            milieu = c; 
            max = b; }
      }
      else if (b <= a && b <= c) {
        min = b;
        if (a <= c) { 
            milieu = a; 
            max = c; }
        else        { 
            milieu = c; 
            max = a; }
      }
      else {
        min = c;
        if (a <= b) { 
            milieu = a; 
            max = b; }
        else{ 
            milieu = b; max = a; }
      }

      alert("les nombres dans l'ordre croissant : " + min + " " + milieu + " " + max);
    }

    troisNombres();
  </script>

</body>
</html>
