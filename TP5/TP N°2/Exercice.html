<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="index.html" method="get">

        <label for="nom">Entrez votre nom:</label><br>
        <input type="text" id="nom" name="nom"><br>
        <label for="prénom">Entrez un Prénom :</label><br>
        <input type="text" id="prénom" name="prénom"><br>
        <h4>Les listes déroulantes </h4>
        votre niveau de communication :
        <select name="communication" id="communication">
            <option value="Excellent">Excellent</option>
            <option value="Bien">Bien</option>
            <option value="Assez Bien">Assez Bien </option>
            <option value="Passable">Passable </option>

        </select><br>

        <h4>Les Cases à Cocher </h4>
         <label for="sport" style="width: 10%;display: inline-block;">Sport</label>
        <input type="checkbox" id="sport" name="loisirs" value="Sport"><br>

        <label for="internet" style="width: 10%;display: inline-block;">Explorer Internet</label>
        <input type="checkbox" id="internet" name="loisirs" value="Explorer Internet"><br>

        <label for="lecture" style="width: 10%;display: inline-block;">Lecture</label>
        <input type="checkbox" id="lecture" name="loisirs" value="Lecture"><br>

        <label for="television"style="width: 10%;display: inline-block;">Télévision</label>
        <input type="checkbox" id="television" name="loisirs" value="Télévision"><br><br>

        <h4>Les Boutons Radio : </h4>
        <p>Quel est votre niveau en HTML :</p>
        <label for="excellent">Excellent</label>
        <input type="radio" id="excellent" name="niveau" value="Excellent">

        <label for="moyen">Moyen</label>
        <input type="radio" id="moyen" name="niveau" value="Moyen">

        <label for="debutant">Débutant</label>
        <input type="radio" id="debutant" name="niveau" value="Débutant"><br><br>

        <input type="submit" value="Envoyer">
        <input type="reset" value="Annuler">
</form>
</body>
</html>
